# Phase 2 Step 5 — RTSP adapter test scene.
# Two RTSP camera tiles in a 1×2 grid.
# Run with: final-multiplex scene-step5.toml
#
# Requires fm-rtsp-adapter on $PATH or in the same directory as the binary.
# GStreamer plugins required on the host:
#   gst-plugins-good:  rtspsrc
#   gst-plugins-base:  decodebin3, videoconvert, videoscale, audioconvert,
#                      audioresample, capsfilter
#   gst-plugins-bad:   shmsink
#   gst-plugins-ugly or gst-libav: H.264 decoder (avdec_h264 or nvh264dec)

[grid]
columns                   = 2
width                     = 1920
height                    = 1080
fps                       = 30
# RTSP cold-start can exceed 10 s; 45 s is a safe ceiling on slow cameras.
adapter_ready_timeout_secs = 45

[[source]]
id          = "cam-27"
source_type = "external"
adapter     = "fm-rtsp-adapter"
uri         = "rtsp://monitor:QaUUk02YUO2zZ@10.0.0.27"
volume      = 0.4
offset_ms   = 0

[[source]]
id          = "cam-77"
source_type = "external"
adapter     = "fm-rtsp-adapter"
uri         = "rtsp://monitor:QaUUk02YUO2zZ@10.0.0.77/Preview_01_main"
volume      = 0.4
offset_ms   = 500
