# T1 measurement scene — single dummy source, no framing.
# Used by Group 1 of the transport TaskBlock to verify whether shmsrc
# do-timestamp=false preserves adapter PTS without GDP.
# Run with: final-multiplex scene-t1.toml

[grid]
columns                    = 1
width                      = 1920
height                     = 1080
fps                        = 30
adapter_ready_timeout_secs = 15

[[source]]
id          = "dummy-a"
source_type = "external"
adapter     = "fm-dummy-adapter"
volume      = 0.1
offset_ms   = 0
