# T3 offset accuracy test scene — cam-27 (offset=0) + cam-77 (offset=2000ms).
# At the compositor, cam-27 PTS and cam-77 PTS should differ by ~2000 ms flat.
# Run with: final-multiplex scene-t3.toml
#
# Expected (unixfd + voff_q leaky=upstream + compositor latency=ceiling):
#   cam-27 PTS at compositor ≈ t
#   cam-77 PTS at compositor ≈ t + 2000 ms  (flat delta, not growing)
#
# Failure pattern (pre-fix, leaky=downstream): cam-77 delta grows as n×2800 ms.

[grid]
columns                    = 2
width                      = 1920
height                     = 1080
fps                        = 30
live_offset_ceiling_ms     = 2000
adapter_ready_timeout_secs = 45

[[source]]
id          = "cam-27"
source_type = "external"
adapter     = "fm-rtsp-adapter"
uri         = "rtsp://monitor:QaUUk02YUO2zZ@10.0.0.27"
volume      = 0.4
offset_ms   = 0

[[source]]
id          = "cam-77"
source_type = "external"
adapter     = "fm-rtsp-adapter"
uri         = "rtsp://monitor:QaUUk02YUO2zZ@10.0.0.77/Preview_01_main"
volume      = 0.4
offset_ms   = 2000
